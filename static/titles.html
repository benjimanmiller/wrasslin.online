<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Titles - Wrasslin!!</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1><a href="index.html">Wrasslin!</a></h1>
        <nav>
            <ul>
                <li><a href="myaccount.html">My Account</a></li>
                <li><a href="login.html">Logout</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="titles-container">
            <!-- Left: List of Titles -->
            <div class="left-col">
                <h3>My Titles</h3>
                <div id="titlesList">Loading...</div>
            </div>

            <!-- Right: Title Details & History -->
            <div class="right-col">
                <div id="titleDetails" class="settings-card" style="display: none;">
                    <h2 id="selectedTitleName">Title Name</h2>
                    <p id="selectedTitleType" style="color: #666;"></p>
                    
                    <h4>Championship History</h4>
                    <table class="history-table">
                        <thead><tr><th>Won</th><th>Lost</th><th>Champion</th><th>Group ID</th><th>Match ID</th><th>Notes</th></tr></thead>
                        <tbody id="historyBody"></tbody>
                    </table>

                    <h4>Add New Reign</h4>
                    <form id="addHistoryForm">
                        <input type="hidden" name="title_id" id="historyTitleId">
                        <div class="form-group"><label>Date Won</label><input type="date" name="won_date"></div>
                        <div class="form-group"><label>Date Lost</label><input type="date" name="lost_date"></div>
                        <div class="form-group"><label>Champion User ID (Optional)</label><input type="number" name="wrestler_id" placeholder="User ID"></div>
                        <div class="form-group"><label>Group ID (Faction/Tag)</label><input type="number" name="wrestling_group_id" placeholder="Group ID"></div>
                        <div class="form-group"><label>OR Champion Name (Non-User)</label><input type="text" name="champion_name" placeholder="e.g. Abraham Lincoln"></div>
                        <div class="form-group"><label>Match ID</label><input type="number" name="match_id" placeholder="Match ID"></div>
                        <div class="form-group"><label>Notes</label><input type="text" name="notes" placeholder="e.g. Won at Wrestlemania"></div>
                        <button type="submit">Add History</button>
                    </form>

                    <h4>Title Defenses</h4>
                    <table class="history-table">
                        <thead><tr><th>Match ID</th><th>Result</th><th>Notes</th></tr></thead>
                        <tbody id="defenseBody"></tbody>
                    </table>
                    <h4>Log Defense</h4>
                    <form id="addDefenseForm">
                        <input type="hidden" name="title_id" id="defenseTitleId">
                        <div class="form-group"><label>Match ID</label><input type="number" name="match_id" required></div>
                        <div class="form-group"><label>Result</label><input type="text" name="result" placeholder="Retained, DQ, etc"></div>
                        <div class="form-group"><label>Notes</label><input type="text" name="notes"></div>
                        <button type="submit">Log Defense</button>
                    </form>
                </div>
                <div id="emptyState" class="settings-card">Select a title to view history.</div>
            </div>
        </div>
    </main>
    <script src="js/titles.js"></script>
</body>
</html>
